<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartIt - Log in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    font-size:62.5%;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e6e6;
    font-family:'Inter',sans-serif;
    padding:2rem;
}

.form{
    width:100%;
    max-width:42rem;
    padding:4.5rem 4rem;
    background:#fff;
    border-radius:1.8rem;
    box-shadow:0 2rem 6rem rgba(0,0,0,0.08);
}

.form p:first-child{
    color:#777;
    font-size:1.5rem;
    margin-bottom:.5rem;
}

.form h2{
    font-size:3.4rem;
    font-weight:600;
    margin-bottom:3rem;
}

label{
    font-size:1.5rem;
    margin-bottom:.6rem;
    color:#333;
    display:block;
}

.field-input{
    width:100%;
    border:none;
    border-bottom:.2rem solid #ddd;
    padding:1rem 0;
    margin-bottom:2.8rem;
    font-size:1.6rem;
    transition:.3s;
    outline:none;
    font-family:'Inter',sans-serif;
}

.field-input:focus{
    border-color:#07073d;
}

.submit{
    width:100%;
    padding:1.4rem;
    border:none;
    border-radius:3rem;
    background:#07073d;
    color:#fff;
    font-size:1.7rem;
    font-weight:500;
    margin-top:1rem;
    transition:.3s;
    cursor:pointer;
}

.submit:hover{
    background:#0d0d6b;
}

.submit:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.form form + p{
    text-align:center;
    margin:2.5rem 0 1.5rem;
    color:#666;
    font-size:1.4rem;
}

.social{
    display:flex;
    gap:3rem;
    justify-content:center;
}

.btn{
    background:#eee;
    padding:1rem 1.8rem;
    border-radius:3rem;
    border:none;
    font-size:1.4rem;
    font-weight:500;
    transition:.3s;
    cursor:pointer;
}

.btn:hover{
    background:#e0e0e0;
}

.last{
    text-align:center;
    margin-top:2.5rem;
    font-size:1.4rem;
}

.last a{
    font-weight:600;
    color:#07073d;
    text-decoration:none;
}

.last a:hover{
    text-decoration:underline;
}

.alert{
    padding:1.2rem 1.6rem;
    border-radius:1rem;
    margin-bottom:1.6rem;
    font-size:1.4rem;
    display:none;
}

.alert.success{
    background:#dcfce7;
    color:#166534;
    border:1px solid #bbf7d0;
    display:block;
}

.alert.error{
    background:#fef2f2;
    color:#991b1b;
    border:1px solid #fecaca;
    display:block;
}

@media (max-width:600px){
    html{ font-size:56%; }
}

@media (max-width:400px){
    html{ font-size:52%; }
}
</style>
</head>
<body>

<div class="form">
    <p>Investor portal</p>
    <h2>Secure Access</h2>

    <div id="alert" class="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <label>Institutional Email</label>
        <input type="email" id="email" class="field-input" placeholder="jane@company.com" required>

        <label>Access Key</label>
        <input type="password" id="password" class="field-input" placeholder="••••••••" required>

        <button type="submit" id="submitBtn" class="submit">Log in</button>
    </form>

    <p>Or continue with</p>
    <div class="social">
        <button class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.65,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C39.99,36.218,44,30.636,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Google
        </button>
        <button class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px">
                <path fill="#0288D1" d="M42,37c0,2.762-2.238,5-5,5H11c-2.761,0-5-2.238-5-5V11c0-2.762,2.239-5,5-5h26c2.762,0,5,2.238,5,5V37z"/>
                <path fill="#FFF" d="M12 19H17V36H12zM14.485 17h-.028C12.965 17 12 15.888 12 14.499 12 13.08 12.995 12 14.514 12c1.521 0 2.458 1.08 2.486 2.499C17 15.887 16.035 17 14.485 17zM36 36h-5v-9.099c0-2.198-1.225-3.698-3.192-3.698-1.501 0-2.313 1.012-2.707 1.99C24.957 25.543 25 26.511 25 27v9h-5V19h5v2.616C25.721 20.5 26.85 19 29.738 19c3.578 0 6.261 2.25 6.261 7.103L36 36 36 36z"/>
            </svg>
            LinkedIn
        </button>
    </div>

    <div class="last">
        New to the Network? <a href="./register.html">Create an Account</a>
    </div>
</div>

<script>
const API_BASE = 'https://dev-storage-c.pantheonsite.io/collab/domdom%20plus/api';

window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('auth_token');
    if (token) {
        window.location.href = './index.html';
        return;
    }

    const savedEmail = localStorage.getItem('registered_email');
    if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        localStorage.removeItem('registered_email');
    }
});

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = 'alert ' + type;
}

function hideAlert() {
    document.getElementById('alert').className = 'alert';
}

async function handleLogin(e) {
    e.preventDefault();
    hideAlert();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    if (!email || !password) {
        showAlert('Please enter your email and password.', 'error');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
        const response = await fetch(API_BASE + '/login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem('auth_token',    data.token);
            localStorage.setItem('user_username', data.username);
            localStorage.setItem('user_fullname', data.fullname);
            localStorage.setItem('user_email',    data.email);
            localStorage.setItem('user_role',     data.role);

            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = './index.html';
            }, 1500);
        } else {
            showAlert(data.message || 'Login failed. Please check your credentials.', 'error');
            btn.disabled = false;
            btn.textContent = 'Log in';
        }
    } catch (err) {
        showAlert('Connection error. Please check your internet and try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Log in';
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - StartIt</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        :root {
            --color-primary: #002045;
            --color-primary-container: #1a365d;
            --color-on-primary: #ffffff;
            --color-surface: #f7f9fb;
            --color-surface-container-lowest: #ffffff;
            --color-surface-container-low: #f2f4f6;
            --color-surface-container-high: #e6e8ea;
            --color-on-surface: #191c1e;
            --color-on-surface-variant: #43474e;
            --color-outline: #74777f;
            --font-headline: "Manrope", sans-serif;
            --font-body: "Inter", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background-color: var(--color-surface);
            color: var(--color-on-surface);
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-navbar {
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            padding: 0 2rem;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-navbar__left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-headline);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .back-btn:hover { background: var(--color-surface-container-high); }

        .chat-startup-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .chat-startup-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-container));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-startup-name {
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 1rem;
            color: var(--color-on-surface);
        }

        .chat-startup-status {
            font-size: 0.75rem;
            color: var(--color-on-surface-variant);
        }

        .brand-link {
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: -0.04em;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            padding: 1rem 0;
            scrollbar-width: thin;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--color-surface-container-high);
            border-radius: 4px;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
        }

        .msg-row.own { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--color-surface-container-high);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-headline);
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--color-on-surface-variant);
            flex-shrink: 0;
        }

        .msg-row.own .msg-avatar {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-container));
            color: white;
        }

        .msg-bubble-wrap { display: flex; flex-direction: column; max-width: 65%; }
        .msg-row.own .msg-bubble-wrap { align-items: flex-end; }

        .msg-sender {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--color-outline);
            margin-bottom: 0.3rem;
            letter-spacing: 0.04em;
        }

        .msg-bubble {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            line-height: 1.55;
            word-break: break-word;
            background: var(--color-surface-container-lowest);
            border: 1px solid rgba(196, 198, 207, 0.15);
            color: var(--color-on-surface);
        }

        .msg-row.own .msg-bubble {
            background: var(--color-primary);
            color: white;
            border-color: transparent;
        }

        .msg-time {
            font-size: 0.6875rem;
            color: var(--color-outline);
            margin-top: 0.3rem;
        }

        .chat-input-area {
            border-top: 1px solid rgba(196, 198, 207, 0.2);
            padding-top: 1.25rem;
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
        }

        .chat-input-wrap {
            flex: 1;
            background: var(--color-surface-container-lowest);
            border: 1px solid rgba(196, 198, 207, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s;
        }
        .chat-input-wrap:focus-within { border-color: var(--color-primary); }

        .chat-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: var(--font-body);
            font-size: 0.875rem;
            color: var(--color-on-surface);
            background: transparent;
            resize: none;
            min-height: 20px;
            max-height: 120px;
            line-height: 1.5;
        }
        .chat-input::placeholder { color: var(--color-outline); }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-container));
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: box-shadow 0.2s, transform 0.1s;
        }
        .send-btn:hover { box-shadow: 0 6px 16px rgba(0,32,69,0.25); transform: translateY(-1px); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: var(--color-outline);
            text-align: center;
        }

        .chat-empty .material-symbols-outlined { font-size: 3rem; opacity: 0.4; }
        .chat-empty p { font-size: 0.9rem; }

        .auth-wall {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            text-align: center;
            padding: 2rem;
        }

        .auth-wall h2 {
            font-family: var(--font-headline);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-on-surface);
        }

        .auth-wall p { color: var(--color-on-surface-variant); font-size: 0.9rem; }

        .btn-primary-solid {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-container));
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-family: var(--font-headline);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .btn-primary-solid:hover { box-shadow: 0 8px 20px rgba(0,32,69,0.2); }
    </style>
</head>

<body>
    <nav class="chat-navbar">
        <div class="chat-navbar__left">
            <button class="back-btn" onclick="goBack()">
                <span class="material-symbols-outlined" style="font-size:1.1rem;">arrow_back</span>
                Back
            </button>
            <div class="chat-startup-info">
                <div class="chat-startup-avatar" id="startupInitial">AD</div>
                <div>
                    <div class="chat-startup-name" id="chatStartupName">Aether Dynamics</div>
                    <div class="chat-startup-status">Startup · Investment Conversation</div>
                </div>
            </div>
        </div>
        <a href="./index.html" class="brand-link">StartIt</a>
    </nav>

    <div class="chat-main">
        <div id="authWall" class="auth-wall" style="display:none;">
            <span class="material-symbols-outlined" style="font-size:3rem;color:var(--color-primary);opacity:0.6;">lock</span>
            <h2>Login Required</h2>
            <p>You need to be logged in to chat with startups.</p>
            <button class="btn-primary-solid" onclick="window.location.href='./login.html'">Log in to continue</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty" id="chatEmpty">
                <span class="material-symbols-outlined">chat_bubble</span>
                <p>No messages yet. Start the conversation!</p>
            </div>
        </div>

        <div class="chat-input-area" id="chatInputArea">
            <div class="chat-input-wrap">
                <textarea
                    class="chat-input"
                    id="messageInput"
                    placeholder="Type your message..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <span class="material-symbols-outlined" style="font-size:1.25rem;">send</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE  = 'https://dev-storage-c.pantheonsite.io/collab/domdom%20plus/api';
        let startupSlug = '';
        let lastTimestamp = 0;
        let pollInterval  = null;
        let currentUser   = '';

        function goBack() {
            const slug = startupSlug || 'aether-dynamics';
            window.location.href = './startupProfile.html?slug=' + encodeURIComponent(slug);
        }

        function formatTime(iso) {
            try {
                const d = new Date(iso);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch(e) {
                return '';
            }
        }

        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        }

        function appendMessage(msg) {
            const messagesDiv = document.getElementById('chatMessages');
            const empty       = document.getElementById('chatEmpty');
            if (empty) empty.remove();

            const isOwn = msg.from === currentUser;
            const row   = document.createElement('div');
            row.className = 'msg-row' + (isOwn ? ' own' : '');
            row.innerHTML = `
                <div class="msg-avatar">${getInitials(msg.fullname || msg.from)}</div>
                <div class="msg-bubble-wrap">
                    ${!isOwn ? '<span class="msg-sender">' + (msg.fullname || msg.from) + '</span>' : ''}
                    <div class="msg-bubble">${msg.text}</div>
                    <span class="msg-time">${formatTime(msg.created_at)}</span>
                </div>`;
            messagesDiv.appendChild(row);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (msg.timestamp) lastTimestamp = Math.max(lastTimestamp, msg.timestamp);
        }

        async function loadMessages() {
            const token = localStorage.getItem('auth_token');
            if (!token) return;

            try {
                const url = API_BASE + '/get_messages.php?token=' + encodeURIComponent(token) +
                    '&startup_id=' + encodeURIComponent(startupSlug) +
                    '&since=' + lastTimestamp;

                const res  = await fetch(url);
                const data = await res.json();

                if (data.success && data.messages && data.messages.length > 0) {
                    data.messages.forEach(appendMessage);
                }
            } catch(e) {
                console.error('Poll error', e);
            }
        }

        async function sendMessage() {
            const token = localStorage.getItem('auth_token');
            const input = document.getElementById('messageInput');
            const text  = input.value.trim();
            const btn   = document.getElementById('sendBtn');

            if (!text) return;

            btn.disabled  = true;
            input.disabled = true;

            try {
                const res  = await fetch(API_BASE + '/send_message.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, startup_id: startupSlug, text })
                });
                const data = await res.json();

                if (data.success) {
                    input.value = '';
                    input.style.height = 'auto';
                    appendMessage(data.data);
                } else {
                    alert(data.message || 'Failed to send message');
                }
            } catch(e) {
                alert('Connection error. Please try again.');
            }

            btn.disabled   = false;
            input.disabled = false;
            input.focus();
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }

            const el = document.getElementById('messageInput');
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        async function loadStartupName(slug) {
            try {
                const res  = await fetch('./data/startup.data.json');
                const data = await res.json();
                const s    = data.find(x => x.slug === slug || String(x.id) === String(slug));
                if (s) {
                    document.getElementById('chatStartupName').textContent = s.name;
                    document.getElementById('startupInitial').textContent  = getInitials(s.name);
                    document.title = 'Chat with ' + s.name + ' - StartIt';
                }
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', function () {
            const token    = localStorage.getItem('auth_token');
            currentUser    = localStorage.getItem('user_username') || '';
            const params   = new URLSearchParams(window.location.search);
            startupSlug    = params.get('slug') || 'aether-dynamics';

            loadStartupName(startupSlug);

            if (!token) {
                document.getElementById('authWall').style.display = 'flex';
                document.getElementById('chatMessages').style.display = 'none';
                document.getElementById('chatInputArea').style.display = 'none';
                return;
            }

            loadMessages();
            pollInterval = setInterval(loadMessages, 5000);
        });

        window.addEventListener('beforeunload', () => {
            if (pollInterval) clearInterval(pollInterval);
        });
    </script>
</body>

</html>
